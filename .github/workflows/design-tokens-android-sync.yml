# Design Tokens Android Sync
#
# Receives the `design-tokens-update` event from amboss-design-system whenever
# tokens-android/package.json bumps on main. Sparse-checkouts DS at the merge
# SHA, copies the Android XML resources and Kotlin Compose objects into
# tokens/android, opens a PR.
#
# Shares the `design-tokens-update` event with its iOS sibling. See
# design-tokens-ios-sync.yml for rationale.

name: Sync Android design tokens

on:
  repository_dispatch:
    types: [design-tokens-update]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Sparse-checkout amboss-design-system at the merge SHA
        uses: actions/checkout@v4
        with:
          repository: amboss-mededu/amboss-design-system
          token: ${{ secrets.MOBILE_REPOS_ACCESS_TOKEN }}
          ref: ${{ github.event.client_payload.sha }}
          path: design-system
          sparse-checkout: |
            packages/tokens-android
          sparse-checkout-cone-mode: false

      - name: Copy Android token files into this repo
        run: |
          mkdir -p tokens/android/res tokens/android/compose
          cp design-system/packages/tokens-android/xml/design_system_color.xml \
             tokens/android/res/design_system_color.xml
          cp design-system/packages/tokens-android/xml/design_system_dimen.xml \
             tokens/android/res/design_system_dimen.xml
          cp design-system/packages/tokens-android/compose/ColorTokens.kt \
             tokens/android/compose/ColorTokens.kt
          cp design-system/packages/tokens-android/compose/DimensionTokens.kt \
             tokens/android/compose/DimensionTokens.kt

      - name: Clean up design-system checkout
        run: rm -rf design-system

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: update tokens-android to ${{ github.event.client_payload.version }}"
          branch: chore/update-tokens-android-${{ github.event.client_payload.version }}
          title: "chore: update tokens-android to ${{ github.event.client_payload.version }}"
          body: |
            ## tokens-android update

            | Field | Value |
            |-------|-------|
            | **New version** | `${{ github.event.client_payload.version }}` |
            | **Previous version** | `${{ github.event.client_payload.previous_version }}` |
            | **DS commit** | [`${{ github.event.client_payload.sha }}`](https://github.com/amboss-mededu/amboss-design-system/commit/${{ github.event.client_payload.sha }}) |

            ---
            *Auto-generated by [trigger-token-sync-mobile.yml](https://github.com/amboss-mededu/amboss-design-system/blob/main/.github/workflows/trigger-token-sync-mobile.yml).*
          labels: design-tokens,automated
          delete-branch: true
