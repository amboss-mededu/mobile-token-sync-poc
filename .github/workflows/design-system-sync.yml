# Design System Sync
#
# Triggered by amboss-design-system whenever a sub-package release is published.
# Downloads the matching tarball asset from the DS GH release and opens a PR
# with the updated files.
#
# Handles multiple event types so a single workflow covers all sub-packages
# this repo consumes (tokens-ios, icons-ios). To consume a new sub-package,
# add its event type below and a corresponding entry in the package matrix.
#
# Required secrets:
#   - MOBILE_REPOS_ACCESS_TOKEN: GH PAT with `repo` scope (read access to
#     amboss-design-system release assets, which are private)

name: Sync from amboss-design-system release

on:
  repository_dispatch:
    types:
      - design-tokens-ios-update
      - design-icons-ios-update

# Event payload (sent by amboss-design-system/.github/workflows/dispatch-mobile-on-release.yml):
#   - package:        sub-package name, e.g. "tokens-ios" or "icons-ios"
#   - version:        sub-package version, e.g. "0.2.3"
#   - asset_name:     tarball filename, e.g. "tokens-ios-0.2.3.tgz"
#   - asset_url:      browser_download_url of the tarball asset
#   - ds_tag:         DS release tag, e.g. "v3.43.3"
#   - ds_release_url: DS GH release page URL

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      # Map the sub-package to its target directory and PR label.
      # To add a new sub-package: add a case branch below and matching event type above.
      - name: Resolve target paths
        id: target
        env:
          PKG: ${{ github.event.client_payload.package }}
        run: |
          case "$PKG" in
            tokens-ios)
              echo "target_dir=tokens/ios" >> "$GITHUB_OUTPUT"
              echo "label=design-tokens" >> "$GITHUB_OUTPUT"
              ;;
            icons-ios)
              echo "target_dir=icons/ios" >> "$GITHUB_OUTPUT"
              echo "label=design-icons" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "Unknown package: $PKG" >&2
              exit 1
              ;;
          esac

      # Download the tarball directly from the GH release asset URL.
      # GH release assets in private repos require an auth token; use the PAT
      # that has read access to amboss-design-system.
      - name: Download tarball from DS release
        env:
          GH_TOKEN: ${{ secrets.MOBILE_REPOS_ACCESS_TOKEN }}
          ASSET_URL: ${{ github.event.client_payload.asset_url }}
          ASSET_NAME: ${{ github.event.client_payload.asset_name }}
        run: |
          curl --fail --location \
            --header "Authorization: Bearer $GH_TOKEN" \
            --header "Accept: application/octet-stream" \
            --output "$ASSET_NAME" \
            "$ASSET_URL"

      # Wipe target dir before unpack so removed/renamed files don't leave orphans.
      - name: Replace target directory contents with tarball
        env:
          TARGET: ${{ steps.target.outputs.target_dir }}
          ASSET_NAME: ${{ github.event.client_payload.asset_name }}
        run: |
          rm -rf "$TARGET"
          mkdir -p "$TARGET"
          tar xzf "$ASSET_NAME" -C "$TARGET"
          rm -f "$ASSET_NAME"

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: update ${{ github.event.client_payload.package }} to ${{ github.event.client_payload.version }}"
          branch: chore/update-${{ github.event.client_payload.package }}-${{ github.event.client_payload.version }}
          title: "chore: update ${{ github.event.client_payload.package }} to ${{ github.event.client_payload.version }}"
          body: |
            ## ${{ github.event.client_payload.package }} update

            | Field | Value |
            |-------|-------|
            | **New version** | `${{ github.event.client_payload.version }}` |
            | **Tarball** | `${{ github.event.client_payload.asset_name }}` |
            | **DS release** | [`${{ github.event.client_payload.ds_tag }}`](${{ github.event.client_payload.ds_release_url }}) |
            | **Target directory** | `${{ steps.target.outputs.target_dir }}` |

            See the [DS CHANGELOG](https://github.com/amboss-mededu/amboss-design-system/blob/main/CHANGELOG.md) for full release notes.

            ---
            *Auto-generated by [dispatch-mobile-on-release.yml](https://github.com/amboss-mededu/amboss-design-system/blob/main/.github/workflows/dispatch-mobile-on-release.yml).*
          labels: ${{ steps.target.outputs.label }},automated
          delete-branch: true
