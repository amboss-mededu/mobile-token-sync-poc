# Design Tokens iOS Sync
#
# Receives the `design-tokens-update` event from amboss-design-system whenever
# tokens-ios/package.json bumps on main. Sparse-checkouts DS at the merge SHA,
# copies the iOS Swift files into tokens/ios, opens a PR.
#
# This workflow shares the `design-tokens-update` event with its Android sibling
# — both fire on every tokens release, but only one produces a non-empty diff
# (the platform that actually bumped). peter-evans/create-pull-request skips
# empty diffs.

name: Sync iOS design tokens

on:
  repository_dispatch:
    types: [design-tokens-update]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Sparse-checkout amboss-design-system at the merge SHA
        uses: actions/checkout@v4
        with:
          repository: amboss-mededu/amboss-design-system
          token: ${{ secrets.MOBILE_REPOS_ACCESS_TOKEN }}
          ref: ${{ github.event.client_payload.sha }}
          path: design-system
          sparse-checkout: |
            packages/tokens-ios
          sparse-checkout-cone-mode: false

      - name: Copy iOS token files into this repo
        run: |
          mkdir -p tokens/ios
          cp design-system/packages/tokens-ios/Sources/AmbossDesignTokens/DesignSystemColorTokens.swift \
             tokens/ios/DesignSystemColorTokens.swift
          cp design-system/packages/tokens-ios/Sources/AmbossDesignTokens/DesignSystemVariables.swift \
             tokens/ios/DesignSystemVariables.swift

      - name: Clean up design-system checkout
        run: rm -rf design-system

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: update tokens-ios to ${{ github.event.client_payload.version }}"
          branch: chore/update-tokens-ios-${{ github.event.client_payload.version }}
          title: "chore: update tokens-ios to ${{ github.event.client_payload.version }}"
          body: |
            ## tokens-ios update

            | Field | Value |
            |-------|-------|
            | **New version** | `${{ github.event.client_payload.version }}` |
            | **Previous version** | `${{ github.event.client_payload.previous_version }}` |
            | **DS commit** | [`${{ github.event.client_payload.sha }}`](https://github.com/amboss-mededu/amboss-design-system/commit/${{ github.event.client_payload.sha }}) |

            ---
            *Auto-generated by [trigger-token-sync-mobile.yml](https://github.com/amboss-mededu/amboss-design-system/blob/main/.github/workflows/trigger-token-sync-mobile.yml).*
          labels: design-tokens,automated
          delete-branch: true
