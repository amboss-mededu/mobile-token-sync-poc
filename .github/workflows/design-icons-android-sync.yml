# Design Icons Android Sync
#
# Receives the `design-icons-android-update` event from amboss-design-system
# after CircleCI has uploaded the icons-android release asset to a DS GitHub
# release. Downloads the asset, wipes icons/android, unpacks the new contents,
# opens a PR.

name: Sync Android icons

on:
  repository_dispatch:
    types: [design-icons-android-update]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Download release asset from DS release
        env:
          GH_TOKEN: ${{ secrets.MOBILE_REPOS_ACCESS_TOKEN }}
          ASSET_URL: ${{ github.event.client_payload.asset_url }}
          ASSET_NAME: ${{ github.event.client_payload.asset_name }}
        run: |
          curl --fail --location \
            --header "Authorization: Bearer $GH_TOKEN" \
            --header "Accept: application/octet-stream" \
            --output "$ASSET_NAME" \
            "$ASSET_URL"

      - name: Replace icons/android contents with release asset
        env:
          ASSET_NAME: ${{ github.event.client_payload.asset_name }}
        run: |
          # Wipe target dir so icons removed in DS don't linger as orphans
          rm -rf icons/android
          # Recreate the empty dir before unpacking
          mkdir -p icons/android
          # Unpack the release asset into the target dir (its contents become ic_*.xml)
          tar xzf "$ASSET_NAME" -C icons/android
          rm -f "$ASSET_NAME"

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: update icons-android to ${{ github.event.client_payload.version }}"
          branch: chore/update-icons-android-${{ github.event.client_payload.version }}
          title: "chore: update icons-android to ${{ github.event.client_payload.version }}"
          body: |
            ## icons-android update

            | Field | Value |
            |-------|-------|
            | **New version** | `${{ github.event.client_payload.version }}` |
            | **Release asset** | `${{ github.event.client_payload.asset_name }}` |
            | **DS release** | [`${{ github.event.client_payload.ds_tag }}`](${{ github.event.client_payload.ds_release_url }}) |

            ---
            *Auto-generated by [trigger-icons-sync-mobile.yml](https://github.com/amboss-mededu/amboss-design-system/blob/main/.github/workflows/trigger-icons-sync-mobile.yml).*
          labels: design-icons,automated
          delete-branch: true
