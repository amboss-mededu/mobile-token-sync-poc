# Design Token Sync
#
# This workflow is triggered automatically by the amboss-design-system repo
# whenever the token version for this platform changes on main.
#
# What it does:
#   1. Checks out the design-system repo at the exact commit that changed tokens
#   2. Copies the generated token files into this repo
#   3. Opens a PR with the changes for review
#
# How to customize:
#   - Edit the FILE MAPPING section below to change which files are copied and where
#   - Edit the PR body to list your actual target file paths
#
# Required secret:
#   - MOBILE_REPOS_ACCESS_TOKEN: a GitHub PAT with read access to amboss-design-system

name: Sync design tokens from design-system

on:
  repository_dispatch:
    types: [design-tokens-update]

# The event payload contains:
#   - version:          new token version (e.g. "0.2.0")
#   - previous_version: previous token version (e.g. "0.1.0")
#   - sha:              full commit SHA in the design-system repo

jobs:
  create-token-update-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      # Download only the token files we need from the design-system repo.
      # "sparse-checkout" avoids cloning the entire repo — only the folder
      # listed below is downloaded.
      - name: Checkout design-system at the exact commit
        uses: actions/checkout@v4
        with:
          repository: amboss-mededu/amboss-design-system
          token: ${{ secrets.MOBILE_REPOS_ACCESS_TOKEN }}
          ref: ${{ github.event.client_payload.sha }}
          path: design-system
          sparse-checkout: |
            packages/tokens-ios
          sparse-checkout-cone-mode: false

      # =====================================================================
      # FILE MAPPING — edit this section to match your repo structure
      #
      # Left side:  path in the design-system repo
      # Right side: path in this repo where the file should go
      #
      # To add more files, add more "cp" lines below.
      # To remove a file, delete or comment out the corresponding line.
      # =====================================================================
      - name: Copy token files into this repo
        run: |
          cp design-system/packages/tokens-ios/Sources/AmbossDesignTokens/DesignSystemColorTokens.swift \
             tokens/ios/DesignSystemColorTokens.swift

          cp design-system/packages/tokens-ios/Sources/AmbossDesignTokens/DesignSystemVariables.swift \
             tokens/ios/DesignSystemVariables.swift

      - name: Clean up design-system checkout
        run: rm -rf design-system

      # Creates a PR if any files changed. If nothing changed,
      # no PR is created (safe to run multiple times).
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: update design tokens to ${{ github.event.client_payload.version }}"
          branch: chore/update-design-tokens-${{ github.event.client_payload.version }}
          title: "chore: update design tokens to ${{ github.event.client_payload.version }}"
          body: |
            ## Design Token Update

            | Field | Value |
            |-------|-------|
            | **New version** | `${{ github.event.client_payload.version }}` |
            | **Previous version** | `${{ github.event.client_payload.previous_version }}` |
            | **Design system commit** | [`${{ github.event.client_payload.sha }}`](https://github.com/amboss-mededu/amboss-design-system/commit/${{ github.event.client_payload.sha }}) |

            ### Changed files
            - `tokens/ios/DesignSystemColorTokens.swift`
            - `tokens/ios/DesignSystemVariables.swift`

            ---
            *This PR was created automatically by the [design token sync workflow](https://github.com/amboss-mededu/amboss-design-system/blob/main/.github/workflows/trigger-token-sync-mobile.yml).*
          labels: design-tokens,automated
          delete-branch: true
